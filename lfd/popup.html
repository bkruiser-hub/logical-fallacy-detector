<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logical Fallacy Detector</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:420px;min-height:220px;max-height:600px;font-family:'Segoe UI',Tahoma,sans-serif;background:#1a1a2e;color:#e0e0e0;overflow-y:auto}
.header{background:linear-gradient(135deg,#16213e,#0f3460);padding:16px;text-align:center;border-bottom:2px solid #e94560}
.header h1{font-size:18px;color:#e94560;margin-bottom:4px}
.header p{font-size:11px;color:#a0a0b0}
.header .badge{display:inline-block;margin-top:6px;padding:2px 10px;background:#4ecca3;color:#1a1a2e;border-radius:10px;font-size:10px;font-weight:700}
.settings{padding:12px 16px;border-bottom:1px solid #2a2a4a}
.settings label{display:block;font-size:12px;color:#a0a0b0;margin-bottom:4px}
.key-row{display:flex;gap:6px}
.key-row input{flex:1;padding:8px 10px;border:1px solid #2a2a4a;border-radius:6px;background:#16213e;color:#e0e0e0;font-size:13px;outline:none}
.key-row input:focus{border-color:#e94560}
.save-btn{padding:8px 12px;border:none;border-radius:6px;background:#4ecca3;color:#1a1a2e;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.save-btn:hover{background:#3dbb92}
.save-btn.saved{background:#2a8a6e}
.hint{font-size:10px;color:#666;margin-top:6px;line-height:1.6}
.hint a{color:#e94560}
.key-status{font-size:11px;margin-top:4px;display:none}
.options{padding:10px 16px;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;gap:10px}
.toggle-wrap{display:flex;align-items:center;gap:8px;flex:1}
.toggle-wrap label{font-size:12px;color:#c0c0d0;cursor:pointer}
.switch{position:relative;width:36px;height:20px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#2a2a4a;border-radius:20px;transition:.3s}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#888;border-radius:50%;transition:.3s}
.switch input:checked+.slider{background:#e94560}
.switch input:checked+.slider:before{transform:translateX(16px);background:#fff}
.img-count{font-size:10px;color:#666;white-space:nowrap}
.actions{padding:12px 16px;display:flex;gap:8px}
.btn{flex:1;padding:10px 12px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#e94560,#c23152);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,#ff5a75,#e94560);transform:translateY(-1px)}
.btn-primary:disabled{background:#444;cursor:not-allowed;transform:none}
.btn-secondary{background:#2a2a4a;color:#a0a0b0}
.btn-secondary:hover{background:#3a3a5a}
.status{padding:8px 16px;text-align:center;font-size:12px;color:#a0a0b0;min-height:20px}
.status.error{color:#e94560}.status.success{color:#4ecca3}.status.working{color:#f0c040}
.results-section{padding:0 16px 16px}
.results-section h2{font-size:14px;color:#e94560;margin-bottom:8px;padding-top:8px}
.fallacy-card{background:#16213e;border:1px solid #2a2a4a;border-left:3px solid #e94560;border-radius:8px;padding:12px;margin-bottom:10px}
.fallacy-card .fn{font-size:14px;font-weight:700;color:#e94560;margin-bottom:4px}
.fallacy-card .src{font-size:10px;color:#4ecca3;margin-bottom:4px;font-weight:600}
.fallacy-card .fq{font-size:11px;color:#888;font-style:italic;margin-bottom:6px;padding:6px 8px;background:#0f0f2a;border-radius:4px;border-left:2px solid #444}
.fallacy-card .fe{font-size:12px;color:#c0c0d0;line-height:1.5}
.no-fallacies{text-align:center;padding:20px;color:#4ecca3;font-size:14px}
.no-fallacies small{color:#888}
.model-info{font-size:10px;color:#555;text-align:right;padding:4px 16px 0}
.footer{padding:8px 16px;text-align:center;font-size:10px;color:#555;border-top:1px solid #2a2a4a}
</style>
</head>
<body>
<div class="header">
  <h1>&#128269; Logical Fallacy Detector</h1>
  <p>AI-powered analysis of reasoning errors</p>
  <span class="badge">&#9889; FREE — Text + Image Analysis</span>
</div>
<div class="settings">
  <label for="apiKey">Google Gemini API Key</label>
  <div class="key-row">
    <input type="password" id="apiKey" placeholder="AIza...">
    <button class="save-btn" id="saveKeyBtn">Save Key</button>
  </div>
  <div class="key-status" id="keyStatus"></div>
  <div class="hint">
    Free! No credit card needed.<br>
    1. Go to <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a><br>
    2. Click <b>"Create API key in new project"</b><br>
    3. Paste above &rarr; click Save Key
  </div>
</div>
<div class="options">
  <div class="toggle-wrap">
    <label class="switch"><input type="checkbox" id="includeImages" checked><span class="slider"></span></label>
    <label for="includeImages">Include images in analysis</label>
  </div>
  <span class="img-count" id="imgCount"></span>
</div>
<div class="actions">
  <button class="btn btn-primary" id="analyzeBtn">&#128269; Analyze This Page</button>
  <button class="btn btn-secondary" id="clearBtn">Clear</button>
</div>
<div class="status" id="status"></div>
<div id="resultsContainer"></div>
<div class="footer">Powered by Google Gemini &middot; 100% Free &middot; v1.5</div>
<script src="popup.js"></script>
</body>
</html>
